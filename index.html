<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This web page is my project for TOP that showcases my solid understanding of the basics of HTML, CSS and JavaScript."
    />
    <meta name="author" content="Eric Jay R. Salan" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./main.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <div class="screen">
          <div class="equation"></div>
          <div class="display"></div>
        </div>
        <button class="clear top-operators">CLEAR</button>
        <button class="operator right-operators">÷</button>
        <button class="numbers">7</button>
        <button class="numbers">8</button>
        <button class="numbers">9</button>
        <button class="operator right-operators">x</button>
        <button class="numbers">4</button>
        <button class="numbers">5</button>
        <button class="numbers">6</button>
        <button class="operator right-operators">-</button>
        <button class="numbers">1</button>
        <button class="numbers">2</button>
        <button class="numbers">3</button>
        <button class="operator right-operators">+</button>
        <button id="zero-button" class="numbers">0</button>
        <button class="dot numbers">.</button>
        <button class="operator right-operators">=</button>
      </div>
    </div>
  </body>
</html>
